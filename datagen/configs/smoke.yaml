# 本地冒烟测试配置：原始体 + Eevee，零下载、零网络。
# 用法： python scripts/smoke.py
# 会为 6 个编辑算子各渲一对 (before, after)，方便肉眼检查对齐与 metadata。

run:
  num_jobs: 6
  base_seed: 7
  output_dir: "./out/smoke_raw"
  shard_dir: "./out/smoke_shards"
  shard_size: 100

ray:
  address: "local"
  num_cpus_per_job: 1
  num_gpus_per_job: 0          # 冒烟用 CPU/Eevee 即可

scene:
  name: "tabletop"
  params:
    num_distractors: [1, 2]
    camera_views: 1

assets:
  subject:
    provider: "primitives"     # 零下载
    params:
      kinds: ["CUBE", "SPHERE", "CYLINDER", "CONE", "MONKEY"]
  environment:
    provider: "haven"
    params:
      hdri_dir: "./assets/haven/hdris"   # 不存在 → 自动退回平光，仍可渲染

edits:
  sampling_weights:            # smoke.py 会逐个强制，这里仅占位
    object_move: 1.0
    object_scale: 1.0
    object_rotate: 1.0
    object_replace: 1.0
    object_add: 1.0
    object_delete: 1.0
  params:
    object_move:
      placement_weights:
        support_surface: 3.0
        object_top: 1.0
        floating: 1.0          # tabletop 无天花板/墙，这两个模式会被自动过滤
    object_scale:
      scale_range: [0.5, 1.6]
    object_rotate:
      # 用 X/Y 倾倒轴：对非球面原始体（cube/cone/cylinder/monkey）一定产生可见变化；
      # 绕 Z 转对称物体（cylinder/sphere/cone）看不出变化会被可见性过滤丢弃。
      min_degrees: 30
      max_degrees: 80
      axes: ["X", "Y"]
    object_replace:
      provider: "primitives"
      provider_params:
        kinds: ["CUBE", "SPHERE", "CYLINDER", "CONE", "MONKEY"]

instruction:
  frame: "camera_relative"

render:
  # macOS 无显示器下 Eevee-Next 不会在两次 render() 之间重新评估物体可见性
  # （object_add 先隐藏再显示 → before/after 完全相同被丢弃）；Cycles 正确，且与生产一致。
  backend: "cycles_gpu"        # 本机无 OptiX/CUDA → 自动回退 CPU/Metal + OIDN 去噪
  resolution: [512, 512]
  samples: 16
  global_illumination: "full"
  min_pixel_change_ratio: 0.005
  min_visible_fraction: 0.1
  min_subject_area_ratio: 0.003
  max_subject_area_ratio: 0.95
  quality:                        # 渲染后质量门槛（QualityFilter）
    max_change_ratio: 0.9
    min_sharpness: 3.0
    max_background_diff: 3.0
