# 示例：**多场景数据集 × 多物体数据集** 组合（都可多选、按权重混合）。
# 跑：python -m orchestrator.ray_runner --config configs/multi_dataset.yaml
#     或本地：python scripts/run_local.py --config configs/multi_dataset.yaml --num-jobs N

run:
  num_jobs: 100
  base_seed: 1000
  output_dir: "./out/multi_raw"
  shard_dir: "./out/multi_shards"
  shard_size: 200
  granularity: "amortized"     # amortized（一 job=一场景产多对，资源按场景档）| per_edit（一 job=一算子一对）

# —— 场景数据集：多选，按权重每 job 随机挑一个 ——（也可只写 legacy 单个 `scene:`）
scenes:
  - {name: "hssd",     weight: 4, params: {data_dir: "./assets/hssd", min_subject_size: 0.4}}
  - {name: "tabletop", weight: 1, params: {num_distractors: [1, 3]}}
  # - {name: "room",   weight: 1, params: {}}          # 合成房间
  # - {name: "front3d", weight: 1, params: {...}}       # 3D-FRONT（gated）

# —— 物体数据集：多选，按权重（供 add / replace / 变换的 spawn 主体）——
object_sources:
  - {provider: "objaverse",  weight: 4, params: {uid_list: "./assets/objaverse_uids.txt",
       local_cache: "./assets/objaverse", category_map: "./assets/objaverse_categories.json", target_size: 0.30}}
  - {provider: "primitives", weight: 1, params: {}}     # 零下载的基础几何体
  # 以后接新数据集：再加一行 {provider: <name>, weight: ..., params: {...}}

ray:
  address: "local"
  max_in_flight: 8
  profile_by: "scene"          # 按场景数据集选资源档（大房间多给 CPU）
  resources:
    default:  {num_cpus: 2, num_gpus: 1}
    hssd:     {num_cpus: 4, num_gpus: 1}
    tabletop: {num_cpus: 1, num_gpus: 1}

edits:
  # 目标产出占比（亏空采样命中）；均衡就全 1
  sampling_weights: {object_delete: 1, object_replace: 1, object_scale: 1,
                     object_rotate: 1, object_move: 1, object_add: 1}
  params:
    object_add:    {spawn: true, prefer_on_object: true}      # provider 由 object_sources 注入
    object_replace: {same_category_prob: 0.3}
    object_scale:  {scale_range: [0.6, 1.5], subject_source: {scene: 0.5, spawn: 0.25, replace: 0.25}}
    object_rotate: {min_degrees: 30, max_degrees: 90, axes: ["Z"], subject_source: {scene: 0.6, spawn: 0.2, replace: 0.2}}
    object_move:   {placement_weights: {support_surface: 2, object_top: 1.5, floating: 0},
                    subject_source: {scene: 0.5, spawn: 0.25, replace: 0.25}}

instruction:
  frame: "scene_anchored"

render:
  backend: "cycles_gpu"
  resolution: [512, 512]
  samples: 48
  pairs_per_scene: 12
  min_pixel_change_ratio: 0.0012
  min_visible_fraction: 0.04
  quality: {max_change_ratio: 0.95, min_sharpness: 3.0, max_background_diff: 6.0}
